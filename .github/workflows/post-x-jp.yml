name: post-x-jp
on:
  schedule:
    # 平日(月〜金) 昼12時JST = UTC 3時
    - cron: '0 3 * * 1-5'
    # 土日 昼12時JST = UTC 3時
    - cron: '0 3 * * 0,6'
    # 土日 深夜0時JST = UTC 前日15時（土0時=金UTC15時, 日0時=土UTC15時 → UTC金土=5,6）
    - cron: '0 15 * * 5,6'
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm i
      - run: node index-x-jp.mjs
        env:
          X_APP_KEY: ${{ secrets.X_APP_KEY }}
          X_APP_SECRET: ${{ secrets.X_APP_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
